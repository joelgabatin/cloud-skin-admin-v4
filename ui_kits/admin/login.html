<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cloud Skin Admin — Sign In</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #fff; font-family: var(--font-body); color: var(--navy-800); }
  .login { display: flex; min-height: 100vh; overflow: hidden; }

  /* ============ LEFT PANEL (40%) ============ */
  .left { width: 40%; background: #1A3A5C; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; position: relative; overflow: hidden; }
  .blob1, .blob2 { position: absolute; border-radius: 50%; pointer-events: none; }
  .blob1 { top: -80px; left: -80px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(91,192,235,0.15) 0%, transparent 70%); }
  .blob2 { bottom: -100px; right: -60px; width: 350px; height: 350px; background: radial-gradient(circle, rgba(45,106,159,0.30) 0%, transparent 70%); }
  .left-inner { text-align: center; position: relative; z-index: 1; }
  .logo-plate { width: 72px; height: 72px; border-radius: 20px; background: linear-gradient(135deg, #2D6A9F 0%, #5BC0EB 100%); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; overflow: hidden; }
  .logo-plate img { width: 52px; height: 52px; object-fit: contain; }
  .brand-h1 { font-family: var(--font-display); font-weight: 700; font-size: 28px; color: #fff; margin-bottom: 8px; }
  .brand-sub { font-family: var(--font-display); font-weight: 400; font-size: 16px; color: #5BC0EB; margin-bottom: 4px; }
  .brand-desc { margin-top: 24px; font-family: var(--font-body); font-size: 14px; color: #B8D4EC; line-height: 1.6; max-width: 280px; margin-left: auto; margin-right: auto; }

  .role-section { margin-top: 40px; }
  .eyebrow { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: #5A7A96; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .role-list { display: flex; flex-direction: column; gap: 8px; }
  .role-btn { background: rgba(255,255,255,0.05); border: 1.5px solid rgba(184,212,236,0.20); border-radius: 10px; padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 150ms; }
  .role-btn.active { background: rgba(45,106,159,0.50); border-color: #5BC0EB; }
  .role-avatar { width: 32px; height: 32px; border-radius: 50%; background: #2D6A9F; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 12px; color: #fff; flex-shrink: 0; }
  .role-meta { text-align: left; }
  .role-name { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: #fff; }
  .role-email { font-family: var(--font-body); font-size: 11px; color: #B8D4EC; }
  .role-dot { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: #5BC0EB; display: none; }
  .role-btn.active .role-dot { display: block; }

  /* ============ RIGHT PANEL (60%) ============ */
  .right { width: 60%; background: #fff; display: flex; align-items: center; justify-content: center; padding: 48px; }
  .form { width: 100%; max-width: 380px; }
  .form-h1 { font-family: var(--font-display); font-weight: 700; font-size: 28px; color: #1A2E40; margin-bottom: 6px; }
  .form-sub { font-family: var(--font-body); font-size: 14px; color: #5A7A96; margin-bottom: 32px; }

  .field { margin-bottom: 20px; }
  .field.password { margin-bottom: 12px; }
  .field label { display: block; font-family: var(--font-display); font-weight: 500; font-size: 13px; color: #1A2E40; margin-bottom: 6px; }
  .field input { width: 100%; height: 40px; border: 1.5px solid #D0E8F5; border-radius: 8px; padding: 0 14px; font-family: var(--font-body); font-size: 14px; color: #1A2E40; outline: none; background: #fff; transition: border-color 150ms; }
  .field input:focus { border-color: #2D6A9F; }
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 42px; }
  .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #9BBAD4; padding: 0; display: flex; }
  .pw-toggle .lucide { width: 16px; height: 16px; }

  .forgot { text-align: right; margin-bottom: 24px; }
  .forgot a { font-family: var(--font-body); font-size: 13px; color: #2D6A9F; text-decoration: none; }
  .forgot a:hover { text-decoration: underline; }

  .btn-signin { width: 100%; height: 40px; background: #2D6A9F; color: #fff; border: none; border-radius: 8px; font-family: var(--font-display); font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 150ms; }
  .btn-signin:hover { background: #1F5A8A; }
  .btn-signin.loading { background: #A8CCE8; cursor: not-allowed; }
  .btn-signin .lucide { animation: spin 1s linear infinite; }

  .form-foot { text-align: center; margin-top: 24px; font-family: var(--font-body); font-size: 12px; color: #9BBAD4; }
  .form-foot a { color: #5A7A96; text-decoration: underline; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============ RESPONSIVE ============ */

  /* Tablet (≤ 1024px): keep split layout but tighten widths + padding */
  @media (max-width: 1024px) {
    .left { width: 45%; padding: 40px 28px; }
    .right { width: 55%; padding: 40px 28px; }
    .brand-h1 { font-size: 24px; }
    .form-h1 { font-size: 24px; }
    .role-section { margin-top: 28px; }
    .blob1 { width: 220px; height: 220px; top: -60px; left: -60px; }
    .blob2 { width: 260px; height: 260px; bottom: -80px; right: -50px; }
  }

  /* Mobile (≤ 768px): stack vertically, left becomes compact header */
  @media (max-width: 768px) {
    body { background: #1A3A5C; }
    .login { flex-direction: column; min-height: 100vh; height: auto; overflow: visible; }
    .left { width: 100%; padding: 32px 24px; min-height: auto; flex: 0 0 auto; }
    .right { width: 100%; padding: 32px 24px; flex: 1 1 auto; border-radius: 24px 24px 0 0; margin-top: -8px; }
    .left-inner { width: 100%; max-width: 360px; }
    .logo-plate { width: 60px; height: 60px; border-radius: 16px; margin-bottom: 14px; }
    .logo-plate img { width: 42px; height: 42px; }
    .brand-h1 { font-size: 22px; margin-bottom: 4px; }
    .brand-sub { font-size: 14px; }
    .brand-desc { display: none; }
    .role-section { margin-top: 24px; }
    .role-btn { padding: 8px 12px; }
    .role-avatar { width: 28px; height: 28px; font-size: 11px; }
    .role-name { font-size: 12px; }
    .role-email { font-size: 10px; }
    .blob1 { width: 180px; height: 180px; }
    .blob2 { width: 200px; height: 200px; }

    .form { max-width: 100%; }
    .form-h1 { font-size: 22px; }
    .form-sub { font-size: 13px; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    .form-foot { margin-top: 20px; }
  }

  /* Small mobile (≤ 420px): drop role selector to save room */
  @media (max-width: 420px) {
    .left { padding: 24px 20px; }
    .right { padding: 24px 20px; }
    .role-section { margin-top: 18px; }
    .role-list { gap: 6px; }
    .role-btn { padding: 8px 10px; }
  }

  /* Short-viewport fallback (landscape phones) */
  @media (max-height: 640px) and (max-width: 1024px) {
    .brand-desc { display: none; }
    .role-section { margin-top: 20px; }
  }
</style>
</head>
<body>

<div class="login" data-screen-label="01 Login">

  <!-- ============ LEFT PANEL ============ -->
  <div class="left">
    <div class="blob1"></div>
    <div class="blob2"></div>
    <div class="left-inner">
      <div class="logo-plate"><img src="../../assets/logo-mark.png" alt="Cloud Skin"></div>
      <div class="brand-h1">Cloud Skin Clinic</div>
      <div class="brand-sub">+ Wellness</div>
      <p class="brand-desc">Staff Portal — Internal dashboard for managing appointments, patients, and clinic operations.</p>

      <div class="role-section">
        <div class="eyebrow">Sign in as (Demo)</div>
        <div class="role-list" id="role-list">
          <button class="role-btn active" data-role="admin" data-email="admin@cloudskin.com">
            <div class="role-avatar">AU</div>
            <div class="role-meta">
              <div class="role-name">Admin User</div>
              <div class="role-email">admin@cloudskin.com</div>
            </div>
            <div class="role-dot"></div>
          </button>
          <button class="role-btn" data-role="practitioner" data-email="m.santos@cloudskin.com">
            <div class="role-avatar">MS</div>
            <div class="role-meta">
              <div class="role-name">Dr. Maria Santos</div>
              <div class="role-email">m.santos@cloudskin.com</div>
            </div>
            <div class="role-dot"></div>
          </button>
          <button class="role-btn" data-role="receptionist" data-email="m.gonzales@cloudskin.com">
            <div class="role-avatar">MG</div>
            <div class="role-meta">
              <div class="role-name">Maria Gonzales</div>
              <div class="role-email">m.gonzales@cloudskin.com</div>
            </div>
            <div class="role-dot"></div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ RIGHT PANEL ============ -->
  <div class="right">
    <div class="form">
      <div class="form-h1">Staff Sign In</div>
      <div class="form-sub">For Admin, Practitioners, and Receptionists only</div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" value="admin@cloudskin.com">
      </div>

      <div class="field password">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" value="password">
          <button class="pw-toggle" id="pw-toggle"><i data-lucide="eye"></i></button>
        </div>
      </div>

      <div class="forgot"><a href="#">Forgot Password?</a></div>

      <button class="btn-signin" id="signin"><span id="signin-text">Sign In</span></button>

      <div class="form-foot">
        Not a staff member? <a href="#">Book at cloudskin.com</a>
      </div>
    </div>
  </div>

</div>

<script>
  // Role selector
  document.querySelectorAll('#role-list .role-btn').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('#role-list .role-btn').forEach(o => o.classList.toggle('active', o === b));
    document.getElementById('email').value = b.dataset.email;
  }));

  // Password show/hide
  const pwInput = document.getElementById('password');
  const pwToggle = document.getElementById('pw-toggle');
  pwToggle.addEventListener('click', () => {
    const showing = pwInput.type === 'text';
    pwInput.type = showing ? 'password' : 'text';
    pwToggle.innerHTML = '<i data-lucide="' + (showing ? 'eye' : 'eye-off') + '"></i>';
    lucide.createIcons();
  });

  // Sign in: 800ms loading, then navigate to index.html
  document.getElementById('signin').addEventListener('click', () => {
    const btn = document.getElementById('signin');
    const txt = document.getElementById('signin-text');
    if (btn.classList.contains('loading')) return;
    btn.classList.add('loading');
    btn.innerHTML = '<i data-lucide="loader-2"></i><span>Signing in…</span>';
    lucide.createIcons();
    setTimeout(() => {
      var activeRole = document.querySelector('#role-list .role-btn.active');
      var role = activeRole ? activeRole.dataset.role : 'admin';
      var dest = 'index.html';
      if (role === 'receptionist') dest = 'receptionist-dashboard.html';
      else if (role === 'practitioner') dest = 'practitioner-dashboard.html';
      window.location.href = dest;
    }, 800);
  });

  lucide.createIcons();
</script>
</body>
</html>
