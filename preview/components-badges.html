<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: #fff; display: flex; flex-wrap: wrap; gap: 12px; align-content: flex-start; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 9999px; font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
  .role { padding: 1px 6px; font-size: 10px; }
  .count { background: #EF4444; color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 11px; padding: 1px 7px; border-radius: 9999px; }
</style>
</head>
<body>
<span class="badge" style="background:#DCFCE7; color:#15803D">Confirmed</span>
<span class="badge" style="background:#FEF9C3; color:#A16207">Pending</span>
<span class="badge" style="background:#DBEAFE; color:#1D4ED8">In Progress</span>
<span class="badge" style="background:#F0F6FC; color:#475569">Completed</span>
<span class="badge" style="background:#FEE2E2; color:#B91C1C">Cancelled</span>
<span class="badge" style="background:#FEF3C7; color:#92400E">No Show</span>
<span class="badge" style="background:#FEF3C7; color:#92400E">Low Stock</span>
<span class="badge" style="background:#FEE2E2; color:#B91C1C">Out of Stock</span>
<span class="badge" style="background:#F0FDF4; color:#166534">Cash</span>
<span class="badge" style="background:#EFF6FF; color:#1D4ED8">GCash</span>
<span class="badge" style="background:#F5F3FF; color:#6D28D9">Card</span>
<span class="badge" style="background:#FFF7ED; color:#C2410C">Transfer</span>
<span class="badge role" style="background:#EBF6FD; color:#2D6A9F">Admin</span>
<span class="badge role" style="background:rgba(91,192,235,0.2); color:#5BC0EB">Practitioner</span>
<span class="count">12</span>
<span class="count">5</span>
</body>
</html>
