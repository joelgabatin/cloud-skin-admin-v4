<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 32px; background: #F0F6FC; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(26,58,92,0.08), 0 2px 8px rgba(26,58,92,0.04); }
  .card.primary { background: #2D6A9F; }
  .card.warning { border-left: 4px solid #F59E0B; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .label { font-family: var(--font-body); font-size: 13px; color: #5A7A96; }
  .card.primary .label { color: rgba(255,255,255,0.8); }
  .icon { width: 36px; height: 36px; border-radius: 50%; background: #EBF6FD; color: #5BC0EB; display: flex; align-items: center; justify-content: center; }
  .card.primary .icon { background: rgba(255,255,255,0.2); color: #fff; }
  .value { font-family: var(--font-display); font-weight: 700; font-size: 32px; color: #1A2E40; line-height: 1.1; margin-bottom: 8px; }
  .card.primary .value { color: #fff; }
  .delta { display: flex; align-items: center; gap: 4px; font-family: var(--font-body); font-size: 12px; color: #16A34A; }
  .card.primary .delta { color: rgba(255,255,255,0.8); }
  .warn-meta { display: flex; align-items: center; gap: 4px; font-family: var(--font-body); font-size: 12px; color: #92400E; }
</style>
</head>
<body>
<div class="card primary">
  <div class="top"><span class="label">Today's Appointments</span><div class="icon"><i data-lucide="calendar" width="18" height="18"></i></div></div>
  <div class="value">12</div>
  <div class="delta"><i data-lucide="trending-up" width="13" height="13"></i>+3 vs yesterday</div>
</div>
<div class="card">
  <div class="top"><span class="label">Revenue Today</span><div class="icon"><i data-lucide="dollar-sign" width="18" height="18"></i></div></div>
  <div class="value">₱48,500</div>
  <div class="delta"><i data-lucide="trending-up" width="13" height="13"></i>+12% this week</div>
</div>
<div class="card warning">
  <div class="top"><span class="label">Pending Payments</span><div class="icon"><i data-lucide="credit-card" width="18" height="18"></i></div></div>
  <div class="value">3</div>
  <div class="warn-meta"><i data-lucide="alert-triangle" width="13" height="13" color="#F59E0B"></i>Requires attention</div>
</div>
<div class="card warning">
  <div class="top"><span class="label">Low Stock Items</span><div class="icon"><i data-lucide="package" width="18" height="18"></i></div></div>
  <div class="value">5</div>
  <div class="warn-meta"><i data-lucide="alert-triangle" width="13" height="13" color="#F59E0B"></i>Requires attention</div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
