<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: #fff; }
  .card { background:#fff; border:1px solid var(--tint-200); border-radius:20px; padding:32px; box-shadow: var(--shadow-md); position:relative; }
  .quote-mark { font-family: var(--font-quote); font-size: 64px; color: #5BC0EB; line-height: 0.7; opacity:0.6; display:block; margin-bottom: 12px; }
  .quote { font-family: var(--font-body); font-style: italic; font-size: 15px; color: var(--navy-800); line-height: 1.7; margin: 0; }
  .stars { color: #F59E0B; margin-top: 12px; font-size: 12px; letter-spacing: 2px; }
  .who { border-top:1px solid var(--tint-200); margin-top:14px; padding-top:12px; font-family: var(--font-display); font-weight:600; font-size:14px; color: var(--navy-800); }
  .tag { display:inline-block; margin-top: 4px; padding: 3px 10px; border-radius:9999px; background:#E8F4FD; color: #2D6A9F; font-family: var(--font-display); font-weight:500; font-size:11px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--slate-500); margin-top:16px; }
</style>
</head>
<body>
<div class="card">
  <span class="quote-mark">&ldquo;</span>
  <p class="quote">After just 3 sessions of HydraFacial, my skin has never looked better. The team at Cloud Skin is incredibly professional and caring.</p>
  <div class="stars">★ ★ ★ ★ ★</div>
  <div class="who">Maria Santos</div>
  <span class="tag">HydraFacial</span>
</div>
<div class="meta">Cormorant Garamond 400 · 64px · only used as decorative " glyph on testimonials.</div>
</body>
</html>
