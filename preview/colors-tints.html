<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: #fff; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .row { display: flex; align-items: center; gap: 18px; }
  .swatch { width: 56px; height: 56px; border-radius: 12px; flex-shrink: 0; border: 1px solid var(--tint-200); }
  .meta { display: flex; flex-direction: column; gap: 2px; }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--navy-800); }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--slate-500); }
  .use { font-family: var(--font-body); font-size: 12px; color: var(--slate-500); }
</style>
</head>
<body>
<div class="grid">
  <div class="row"><div class="swatch" style="background:#EBF6FD"></div><div class="meta"><span class="name">Tint 100</span><span class="hex">#EBF6FD</span><span class="use">Badge bg, icon plate</span></div></div>
  <div class="row"><div class="swatch" style="background:#E8F4FD"></div><div class="meta"><span class="name">Tint 150</span><span class="hex">#E8F4FD</span><span class="use">Alt section background (marketing)</span></div></div>
  <div class="row"><div class="swatch" style="background:#D0E8F5"></div><div class="meta"><span class="name">Tint 200</span><span class="hex">#D0E8F5</span><span class="use">Hairline borders, dividers</span></div></div>
  <div class="row"><div class="swatch" style="background:#B8D4EC"></div><div class="meta"><span class="name">Tint 300</span><span class="hex">#B8D4EC</span><span class="use">Muted text on navy</span></div></div>
  <div class="row"><div class="swatch" style="background:#9BBAD4"></div><div class="meta"><span class="name">Tint 500 / Slate 300</span><span class="hex">#9BBAD4</span><span class="use">Footer secondary, placeholders</span></div></div>
  <div class="row"><div class="swatch" style="background:#5A7A96"></div><div class="meta"><span class="name">Slate 500</span><span class="hex">#5A7A96</span><span class="use">Secondary text, captions</span></div></div>
</div>
</body>
</html>
