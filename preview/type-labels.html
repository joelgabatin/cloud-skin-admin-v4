<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: #fff; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 28px; align-items: baseline; flex-wrap: wrap; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--slate-500); margin-top: 4px; }
  .eyebrow { font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--slate-500); }
  .badge   { display: inline-block; padding: 3px 10px; border-radius: 9999px; background: #DCFCE7; color: #15803D; font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
  .role    { display: inline-block; padding: 1px 8px; border-radius: 9999px; background: #EBF6FD; color: #2D6A9F; font-family: var(--font-display); font-weight: 600; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; }
  .mono    { font-family: var(--font-mono); font-size: 12px; color: var(--navy-800); }
  .wordmark { font-family: var(--font-display); font-weight: 700; font-size: 15px; letter-spacing: 0.18em; text-transform: uppercase; color: #4A4A4A; }
  .tagline  { font-family: var(--font-display); font-weight: 400; font-size: 8px;  letter-spacing: 0.20em; text-transform: uppercase; color: #888888; margin-top:2px;}
</style>
</head>
<body>
<div>
  <div class="eyebrow">Sign in as (Demo)</div>
  <div class="meta">DM Sans 600 · 11px · 0.06em · t-eyebrow</div>
</div>
<div class="row">
  <span class="badge">Confirmed</span>
  <span class="role">Admin</span>
  <div class="meta">DM Sans 600 · 10–11px · 0.04em · t-badge</div>
</div>
<div>
  <span class="mono">SKIN-002 · 10:00 AM · ₱48,500</span>
  <div class="meta">JetBrains Mono 400 · 12px · t-mono</div>
</div>
<div>
  <div class="wordmark">Cloud Skin</div>
  <div class="tagline">Clinic + Wellness</div>
  <div class="meta">DM Sans 700/400 · 15/8px · 0.18em/0.20em · brand lockup</div>
</div>
</body>
</html>
