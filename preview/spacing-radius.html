<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px 22px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 64px; height: 64px; background: #2D6A9F; }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--navy-800); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--slate-500); text-align:center; }
  .asym { width: 110px; height: 80px; background: #2D6A9F; border-radius: 0 70px 0 70px; }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:6px"></div><span class="name">6</span><span class="meta">xs · tag</span></div>
  <div class="cell"><div class="box" style="border-radius:8px"></div><span class="name">8</span><span class="meta">sm · input</span></div>
  <div class="cell"><div class="box" style="border-radius:10px"></div><span class="name">10</span><span class="meta">md · logo plate</span></div>
  <div class="cell"><div class="box" style="border-radius:12px"></div><span class="name">12</span><span class="meta">lg · card</span></div>
  <div class="cell"><div class="box" style="border-radius:16px"></div><span class="name">16</span><span class="meta">xl · StatCard</span></div>
  <div class="cell"><div class="box" style="border-radius:20px"></div><span class="name">20</span><span class="meta">2xl · service card</span></div>
  <div class="cell"><div class="box" style="border-radius:9999px"></div><span class="name">pill</span><span class="meta">buttons + badges</span></div>
  <div class="cell"><div class="asym"></div><span class="name">0 70 0 70</span><span class="meta">signature photo</span></div>
</div>
</body>
</html>
