<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: linear-gradient(135deg, #1A3A5C 0%, #2D6A9F 100%); height: 380px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; font-family: var(--font-display); color: #fff; text-align: center; padding: 0 32px; }
  .blob1 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: rgba(91,192,235,0.08); top: -100px; right: -80px; }
  .blob2 { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: rgba(91,192,235,0.06); bottom: -60px; left: 10%; }
  h2 { font-family: var(--font-display); font-weight: 700; font-size: 32px; max-width: 480px; margin: 0 0 12px; line-height: 1.2; }
  p { font-family: var(--font-body); font-size: 15px; color: rgba(255,255,255,0.7); line-height: 1.6; max-width: 420px; margin: 0 0 24px; }
  .btn { display: inline-block; padding: 12px 28px; border-radius: 9999px; font-family: var(--font-display); font-weight: 600; font-size: 14px; background: #069494; color: #fff; text-decoration: none; }
  .content { position: relative; z-index: 1; }
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>
<div class="content">
  <h2>Ready to Start Your Skin Journey?</h2>
  <p>Book your consultation today and let our licensed practitioners create a personalized treatment plan just for you.</p>
  <a class="btn" href="#">Book an Appointment</a>
</div>
</body>
</html>
