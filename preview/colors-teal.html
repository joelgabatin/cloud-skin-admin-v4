<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: #fff; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
  .swatch-row { display: flex; align-items: center; gap: 18px; }
  .swatch { width: 56px; height: 56px; border-radius: 12px; flex-shrink: 0; }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--navy-800); }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--slate-500); }
  .use { font-family: var(--font-body); font-size: 12px; color: var(--slate-500); }
  .meta { display: flex; flex-direction: column; gap: 2px; }
  .btn { display: inline-flex; align-items: center; height: 36px; padding: 0 22px; border-radius: 9999px; font-family: var(--font-display); font-weight: 600; font-size: 14px; color: #fff; border: none; }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch-row">
    <div class="swatch" style="background:#069494"></div>
    <div class="meta"><span class="name">Teal 500 / Marketing Primary</span><span class="hex">#069494</span><span class="use">Book Now, public CTAs</span></div>
  </div>
  <div class="swatch-row">
    <div class="swatch" style="background:#047A7A"></div>
    <div class="meta"><span class="name">Teal 700 / Hover</span><span class="hex">#047A7A</span><span class="use">CTA hover state</span></div>
  </div>
  <div class="swatch-row">
    <button class="btn" style="background:#069494">Book Now</button>
    <button class="btn" style="background:#047A7A">Book Now</button>
    <div class="meta"><span class="name">In context</span><span class="use">Pill rest → hover</span></div>
  </div>
  <div class="swatch-row">
    <div class="swatch" style="background:rgba(6,148,148,0.15); border: 1px dashed #069494"></div>
    <div class="meta"><span class="name">Teal 100 / 15% tint</span><span class="hex">rgba(6,148,148,0.15)</span><span class="use">Social-icon bg on dark footer</span></div>
  </div>
</div>
</body>
</html>
