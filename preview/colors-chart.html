<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: #fff; }
  .row { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; }
  .label { font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--navy-800); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--slate-500); }
  .note { font-family: var(--font-body); font-size: 12px; color: var(--slate-500); margin-top: 14px; }
</style>
</head>
<body>
<div class="row">
  <div class="col"><div class="swatch" style="background:#2D6A9F"></div><span class="label">Chart 1</span><span class="hex">#2D6A9F</span></div>
  <div class="col"><div class="swatch" style="background:#5BC0EB"></div><span class="label">Chart 2</span><span class="hex">#5BC0EB</span></div>
  <div class="col"><div class="swatch" style="background:#1A3A5C"></div><span class="label">Chart 3</span><span class="hex">#1A3A5C</span></div>
  <div class="col"><div class="swatch" style="background:#A8CCE8"></div><span class="label">Chart 4</span><span class="hex">#A8CCE8</span></div>
  <div class="col"><div class="swatch" style="background:#069494"></div><span class="label">Chart 5</span><span class="hex">#069494</span></div>
</div>
<div class="note">Used in Recharts donuts &amp; bars on the admin dashboard. Always ordered light → dark for legend.</div>
</body>
</html>
