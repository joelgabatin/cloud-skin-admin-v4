<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: #fff; }
  .frame { position: relative; aspect-ratio: 16 / 9; overflow: hidden; border-radius: 0 70px 0 70px; box-shadow: 0 24px 64px rgba(26,58,92,0.20); margin: 32px; max-width: 540px; }
  .frame img { width: 100%; height: 100%; object-fit: cover; }
  .overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(255,255,255,0.15) 0%, transparent 40%); }
  .meta { padding: 0 32px 24px; font-family: var(--font-mono); font-size: 11px; color: var(--slate-500); max-width: 540px; }
</style>
</head>
<body>
<div class="frame">
  <img src="../assets/clinic-interior.jpg" alt="Clinic interior">
  <div class="overlay"></div>
</div>
<div class="meta">Signature photo frame: border-radius 0 70px 0 70px · shadow-hero · soft white-to-transparent gradient overlay from left. Used in marketing hero + "Why Us" section.</div>
</body>
</html>
