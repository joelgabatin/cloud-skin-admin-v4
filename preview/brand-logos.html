<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: #fff; display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }
  .row { display: flex; align-items: center; gap: 18px; }
  .mark { width: 96px; height: 96px; object-fit: contain; }
  .stacked { width: 140px; height: 140px; object-fit: contain; }
  .ondark { background: #1A3A5C; padding: 16px; border-radius: 12px; }
  .wordmark { font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: 0.18em; text-transform: uppercase; color: #4A4A4A; }
  .tagline { font-family: var(--font-display); font-weight: 400; font-size: 9px; letter-spacing: 0.20em; text-transform: uppercase; color: #888; margin-top: 4px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--slate-500); }
</style>
</head>
<body>
<div class="row">
  <img class="mark" src="../assets/logo-mark.png" alt="Cloud Skin mark">
  <div>
    <div class="wordmark">Cloud Skin</div>
    <div class="tagline">Clinic + Wellness</div>
    <div class="meta" style="margin-top:8px;">Mark + horizontal lockup</div>
  </div>
</div>
<div class="row">
  <div class="ondark"><img class="stacked" src="../assets/logo-stacked.png" alt="Cloud Skin stacked"></div>
  <div class="meta">Stacked lockup — footer / login splash on navy</div>
</div>
</body>
</html>
